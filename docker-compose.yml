version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multiverso-literario
    restart: always
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    networks:
      - nginx_network

  nginx:
    image: nginx:alpine
    container_name: multiverso-literario-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - nginx_network

networks:
  nginx_network:
    driver: bridge
