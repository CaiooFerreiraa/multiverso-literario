version: "3.8"

services:
  app:
    image: ${DOCKERHUB_USERNAME}/multiverso-literario:latest
    container_name: multiverso-literario
    restart: always

    ports:
      - "3000:3000"

    env_file:
      - .env

    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}

    networks:
      - nginx-proxy-manager_default

networks:
  nginx-proxy-manager_default:
    external: true