services:
  app:
    image: ${DOCKERHUB_USERNAME}/multiverso-literario:latest
    container_name: multiverso-literario
    restart: always
    ports:
      - "80:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
